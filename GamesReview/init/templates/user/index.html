<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Usuário</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="p-3 mb-2 bg-dark text-white">
    
    <div class="d-flex justify-content-between align-items-center p-3 mb-4 border-bottom border-secondary">
        <a href="{% url 'Home' %}" class="btn btn-outline-light btn-sm mb-3">
                <i class="bi bi-arrow-left"></i> Voltar
        </a>
    </div>

    <div class="container d-flex justify-content-center p-3">
        <div class="card bg-dark text-white border-light" style="width: 100%; max-width: 500px;">
            <div class="card-body text-center mt-3">
                
                <i class="bi bi-person-circle display-1"></i>
                
                <h2 class="card-title mt-3">{{ request.user.username }}</h2>
                <p class="card-text text-secondary">Membro desde: {{ request.user.date_joined|date:"d/m/Y" }}</p>

                <hr class="border-secondary">

                <div class="text-start mt-4 mb-4">
                    <p class="mb-2">
                        <i class="bi bi-envelope text-secondary me-2"></i> 
                        <strong>E-mail:</strong> {{ request.user.email|default:"Não informado" }}
                    </p>
                    <p class="mb-2">
                        <i class="bi bi-link text-secondary me-2"></i> 
                        <strong>Url da imagem:</strong> {{request.user.foto_perfil|default:"Não informada"}}
                    </p>
                </div>

                <hr class="border-secondary">

                <div class="d-grid gap-2 mt-4">
                    <button type="button" class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#modalEditar">
                        <i class="bi bi-pencil me-2"></i>Editar Perfil
                    </button>
                    <a href="#" class="btn btn-outline-danger"><i class="bi bi-box-arrow-right me-2"></i>Sair</a>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
